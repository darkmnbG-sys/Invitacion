<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex">
    <title>Boda Jazmin & Jose</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #c9d2c5;
            font-family: 'Cormorant Garamond', serif;
            color: #1a1a1a;
        }
        .mobile-wrapper {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background-color: #c9d2c5;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.1);
            overflow-x: hidden;
            min-height: 100vh;
        }
        .bg-cream {
            background-color: #fdfbf7;
            padding: 50px 20px 80px;
            text-align: center;
        }
        .monogram {
            font-family: 'Cinzel', serif;
            font-size: 4.5em;
            margin: 0;
            line-height: 1;
            letter-spacing: 2px;
            font-weight: 400;
        }
        .quote {
            font-style: italic;
            font-size: 1.4em;
            margin: 20px auto 0;
            max-width: 350px;
        }
        .bg-green {
            background-color: #c9d2c5;
            position: relative;
            padding-bottom: 50px;
        }
        .img-pareja {
            width: 92%;
            max-width: 400px;
            aspect-ratio: 4 / 5;
            object-fit: cover;
            display: block;
            margin: -60px auto 0;
            position: relative;
            z-index: 2;
            /* Efecto de papel rasgado generado con código */
            clip-path: polygon(
                0% 2%, 5% 0%, 10% 3%, 15% 0%, 20% 3%, 25% 1%, 30% 4%, 35% 0%, 40% 3%, 45% 1%, 50% 4%, 55% 0%, 60% 3%, 65% 1%, 70% 4%, 75% 0%, 80% 3%, 85% 1%, 90% 4%, 95% 0%, 100% 2%,
                100% 98%, 95% 100%, 90% 96%, 85% 100%, 80% 97%, 75% 100%, 70% 96%, 65% 100%, 60% 97%, 55% 100%, 50% 96%, 45% 100%, 40% 97%, 35% 100%, 30% 96%, 25% 100%, 20% 97%, 15% 100%, 10% 96%, 5% 100%, 0% 98%
            );
        }
        .css-envelope {
            width: 85%;
            height: 180px;
            margin: -40px auto 0;
            background-color: #92a482;
            position: relative;
            z-index: 1;
        }
        .css-envelope::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #a3b593;
            clip-path: polygon(0 0, 50% 55%, 100% 0);
        }
        .css-envelope::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8a9c7a;
            clip-path: polygon(0 0, 0 100%, 100% 100%, 100% 0, 50% 55%);
        }
        .card-container {
            margin: -110px 25px 0;
            position: relative;
            z-index: 3;
        }
        .card {
            background-color: #fdfbf7;
            padding: 50px 20px 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        .seal {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            background: radial-gradient(circle at 30% 30%, #ffffff, #f0e9e5 70%, #e6dcd8);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1), inset 0 -2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .seal::after {
            content: '❀';
            font-size: 28px;
            color: #d4c4bc;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
        }
        .invite-text {
            font-size: 1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .names {
            font-family: 'Pinyon Script', cursive;
            font-size: 4.5em;
            margin: 5px 0 25px;
            font-weight: normal;
        }
        .date-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            font-size: 1.1em;
            letter-spacing: 1px;
        }
        .date-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-left: 1px solid #1a1a1a;
            border-right: 1px solid #1a1a1a;
            padding: 0 15px;
        }
        .date-center .month { font-size: 0.9em; letter-spacing: 2px; }
        .date-center .day-num { font-size: 2.5em; line-height: 1; margin: 5px 0; }
        .date-center .year { font-size: 0.9em; letter-spacing: 2px; }
        
        .player { margin-bottom: 40px; }
        .player-text { font-size: 1em; letter-spacing: 2px; margin-bottom: 15px; }
        .player-line { width: 60%; height: 2px; background: #1a1a1a; margin: 0 auto 20px; position: relative; }
        .player-dot { width: 10px; height: 10px; background: #1a1a1a; border-radius: 50%; position: absolute; top: -4px; left: 20%; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 1.1em; }
        .play-btn { font-size: 2.2em; cursor: pointer; }
        
        .countdown-title { font-family: 'Pinyon Script', cursive; font-size: 3.5em; margin-bottom: 10px; }
        .countdown-numbers { font-size: 3.2em; font-family: sans-serif; font-weight: 300; letter-spacing: 2px; margin-bottom: 5px; }
        .countdown-labels { display: flex; justify-content: center; gap: 20px; font-size: 0.65em; letter-spacing: 1px; font-family: sans-serif; font-weight: 600;}
        
        .btn { display: inline-block; background-color: #c9d2c5; color: #1a1a1a; text-decoration: none; padding: 15px 30px; border-radius: 25px; font-size: 1em; letter-spacing: 1px; margin-top: 40px; }
        
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px; margin-bottom: 30px; }
        .gallery img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; }
        .footer-img { width: 100%; display: block; min-height: 100px; object-fit: cover; }
    </style>
</head>
<body>
    <div class="mobile-wrapper">
        
        <div class="bg-cream">
            <h1 class="monogram">JJ</h1>
            <p class="quote">"Siempre tuyo, siempre mía, siempre nuestros."<br>Ludwig van Beethoven</p>
        </div>

        <div class="bg-green">
            <img src="fotos/pareja.jpg" alt="Jazmin y Jose" class="img-pareja" onerror="this.style.display='none'">
            
            <div class="css-envelope"></div>

            <div class="card-container">
                <div class="card">
                    <div class="seal"></div>
                    
                    <div class="invite-text">Tenemos el honor de<br>invitarte a nuestra boda</div>
                    <div class="names">Jazmin & Jose</div>
                    
                    <div class="date-layout">
                        <div>SÁBADO</div>
                        <div class="date-center">
                            <span class="month">OCT</span>
                            <span class="day-num">03</span>
                            <span class="year">2026</span>
                        </div>
                        <div>8:30 P.M.</div>
                    </div>

                    <div class="player">
                        <div class="player-text">DALE PLAY</div>
                        <div class="player-line"><div class="player-dot"></div></div>
                        <div class="controls">
                            <i class="fas fa-random"></i>
                            <i class="fas fa-step-backward"></i>
                            <i class="fas fa-play-circle play-btn" id="play-btn"></i>
                            <i class="fas fa-step-forward"></i>
                            <i class="fas fa-sync-alt"></i>
                        </div>
                        <audio id="bg-music" src="cancion.mp3"></audio>
                    </div>

                    <div class="countdown-title">Solo faltan</div>
                    <div class="countdown-numbers" id="timer">0:00:00:00</div>
                    <div class="countdown-labels">
                        <span>DÍAS</span><span>HORAS</span><span>MINUTOS</span><span>SEGUNDOS</span>
                    </div>

                    <a href="CAMBIAR_AQUI_TU_LINK_DE_GOOGLE_FORM" target="_blank" class="btn">CONFIRMAR ASISTENCIA</a>
                </div>
            </div>
        </div>

        <div class="gallery">
            <img src="fotos/foto1.jpg" alt="Foto 1" onerror="this.style.display='none'">
            <img src="fotos/foto2.jpg" alt="Foto 2" onerror="this.style.display='none'">
            <img src="fotos/foto3.jpg" alt="Foto 3" onerror="this.style.display='none'">
            <img src="fotos/foto4.jpg" alt="Foto 4" onerror="this.style.display='none'">
        </div>

        <img src="fotos/footer.jpg" alt="Footer" class="footer-img" onerror="this.style.display='none'">
    </div>

    <script>
        const music = document.getElementById("bg-music");
        const playBtn = document.getElementById("play-btn");

        playBtn.addEventListener("click", function() {
            if (music.paused) {
                music.play();
                playBtn.classList.remove("fa-play-circle");
                playBtn.classList.add("fa-pause-circle");
            } else {
                music.pause();
                playBtn.classList.remove("fa-pause-circle");
                playBtn.classList.add("fa-play-circle");
            }
        });

        const targetDate = new Date("2026/10/03 20:30:00").getTime();

        function pad(n) { return (n < 10 ? '0' : '') + n; }

        setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("timer").innerText = "0:00:00:00";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerText = days + ":" + pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);
        }, 1000);
    </script>
</body>
</html>
