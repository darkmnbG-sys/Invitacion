<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex">
    <title>Boda Jazmin & Jose</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #a3b1a3;
            background-image: radial-gradient(#c4cdc4 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Cormorant Garamond', serif;
            color: #2c3525;
        }
        .mobile-wrapper {
            width: 100%;
            max-width: 480px;
            margin: 0 auto; /* Centrado sin flexbox para evitar que se comprima */
            background-color: #e8ede8;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
            overflow-x: hidden;
            min-height: 100vh;
        }
        .top-section {
            background-color: #fcfaf5;
            padding: 50px 20px 0;
            text-align: center;
            position: relative;
            z-index: 2;
            border-bottom: 3px solid #c5a059;
        }
        .monogram {
            font-family: 'Cinzel', serif;
            font-size: 4.5em;
            margin: 0;
            line-height: 1;
            letter-spacing: 2px;
            color: #c5a059;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .quote {
            font-style: italic;
            font-size: 1.3em;
            margin: 20px auto 30px;
            color: #4a5d3f;
            line-height: 1.4;
        }
        .img-pareja {
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 5; /* Evita que la foto se apachurre */
            object-fit: cover;
            border-radius: 10px 10px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            display: block;
        }
        .css-envelope {
            position: relative;
            width: 100%;
            height: 150px;
            background: linear-gradient(to bottom, #7a916b, #6b825c);
            z-index: 1;
            margin-top: -2px;
        }
        .css-envelope::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #9eb58e, #8da47e);
            clip-path: polygon(0 0, 50% 55%, 100% 0);
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }
        .card-container {
            position: relative;
            margin: -100px 15px 0;
            z-index: 3;
        }
        .card {
            background-color: #fcfaf5;
            padding: 60px 15px 40px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            position: relative;
            border: 1px solid #e0d5c1;
            border-radius: 4px;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 6px;
            left: 6px;
            right: 6px;
            bottom: 6px;
            border: 1px solid #c5a059;
            pointer-events: none;
            opacity: 0.6;
        }
        .seal {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #f4ece8, #e3d5cd);
            background-image: url('fotos/sello.png');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #c5a059;
        }
        .seal::after {
            content: '❀';
            font-size: 30px;
            color: #c5a059;
            position: absolute;
            z-index: -1;
            opacity: 0.5;
        }
        .invite-text {
            font-size: 1.1em;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            line-height: 1.4;
            color: #4a5d3f;
            font-weight: 600;
        }
        .names {
            font-family: 'Pinyon Script', cursive;
            font-size: 3.8em;
            margin: 10px 0;
            font-weight: normal;
            color: #2c3525;
        }
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            height: 1px;
            background: #c5a059;
            width: 25%;
        }
        .divider i {
            color: #c5a059;
            margin: 0 10px;
            font-size: 0.8em;
        }
        .date-layout {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            font-size: 1.1em;
            letter-spacing: 1px;
            font-weight: 600;
            color: #4a5d3f;
        }
        .date-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-left: 2px solid #c5a059;
            border-right: 2px solid #c5a059;
            padding: 0 15px;
        }
        .date-center .month { font-size: 0.9em; letter-spacing: 2px; }
        .date-center .day-num { font-size: 2.5em; line-height: 1; margin: 5px 0; font-family: 'Cinzel', serif; color: #2c3525; }
        .date-center .year { font-size: 0.9em; letter-spacing: 2px; }
        .player { margin-bottom: 35px; padding: 15px; background: #f4f7f4; border-radius: 8px; border: 1px solid #e0e5e0; }
        .player p { letter-spacing: 2px; margin-top: 0; margin-bottom: 10px; font-size: 1em; font-weight: 600; color: #4a5d3f; }
        .progress-bar { width: 80%; height: 3px; background: #d0d5d0; margin: 0 auto 15px; position: relative; border-radius: 2px; }
        .progress-bar::after { content: ''; position: absolute; left: 30%; top: -4px; width: 10px; height: 10px; background: #c5a059; border-radius: 50%; }
        .progress-bar::before { content: ''; position: absolute; left: 0; top: 0; width: 30%; height: 100%; background: #c5a059; border-radius: 2px; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 1.2em; color: #4a5d3f; }
        .play-btn { font-size: 2.2em; cursor: pointer; color: #c5a059; }
        .countdown-title { font-family: 'Pinyon Script', cursive; font-size: 3.2em; margin-bottom: 15px; color: #2c3525; }
        .countdown-container { display: flex; justify-content: center; gap: 8px; margin-bottom: 10px; }
        .time-box { background: #fff; border: 1px solid #e0d5c1; border-radius: 6px; width: 60px; padding: 8px 0; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .time-box span { font-size: 1.8em; font-family: 'Cinzel', serif; font-weight: 600; display: block; color: #4a5d3f; }
        .time-box label { font-size: 0.6em; letter-spacing: 1px; font-family: sans-serif; color: #888; font-weight: bold; }
        .btn { display: inline-block; background: linear-gradient(135deg, #8da47e, #6b825c); color: white; text-decoration: none; padding: 15px 25px; border-radius: 30px; font-size: 1em; letter-spacing: 1px; margin-top: 30px; box-shadow: 0 6px 15px rgba(107, 130, 92, 0.4); border: 1px solid #9eb58e; font-weight: 600; width: 80%; box-sizing: border-box; }
        
        .gallery-title { font-family: 'Cinzel', serif; font-size: 1.5em; text-align: center; margin: 40px 0 20px; color: #4a5d3f; letter-spacing: 2px; }
        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 15px; margin-bottom: 30px; }
        .gallery img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid #fff; }
        
        .footer-img { width: 100%; display: block; min-height: 100px; border-top: 4px solid #c5a059; object-fit: cover; }
    </style>
</head>
<body>
    <div class="mobile-wrapper">
        <div class="top-section">
            <h1 class="monogram">JJ</h1>
            <p class="quote">"Siempre tuyo, siempre mía, siempre nuestros."<br>Ludwig van Beethoven</p>
            <img src="fotos/pareja.png" alt="Jazmin y Jose" class="img-pareja" onerror="this.style.display='none'">
        </div>

        <div class="css-envelope"></div>

        <div class="card-container">
            <div class="card">
                <div class="seal"></div>
                
                <div class="invite-text">Tenemos el honor de<br>invitarte a nuestra boda</div>
                
                <div class="divider"><i class="fas fa-leaf"></i></div>
                
                <div class="names">Jazmin & Jose</div>
                
                <div class="divider"><i class="fas fa-leaf"></i></div>
                
                <div class="date-layout">
                    <div>SÁBADO</div>
                    <div class="date-center">
                        <span class="month">OCT</span>
                        <span class="day-num">03</span>
                        <span class="year">2026</span>
                    </div>
                    <div>8:30 P.M.</div>
                </div>

                <div class="player">
                    <p>DALE PLAY</p>
                    <div class="progress-bar"></div>
                    <div class="controls">
                        <i class="fas fa-random"></i>
                        <i class="fas fa-step-backward"></i>
                        <i class="fas fa-play-circle play-btn" id="play-btn"></i>
                        <i class="fas fa-step-forward"></i>
                        <i class="fas fa-sync-alt"></i>
                    </div>
                    <audio id="bg-music" src="cancion.mp3"></audio>
                </div>

                <div class="countdown-title">Solo faltan</div>
                <div class="countdown-container">
                    <div class="time-box"><span id="days">00</span><label>DÍAS</label></div>
                    <div class="time-box"><span id="hours">00</span><label>HRS</label></div>
                    <div class="time-box"><span id="minutes">00</span><label>MIN</label></div>
                    <div class="time-box"><span id="seconds">00</span><label>SEG</label></div>
                </div>

                <a href="CAMBIAR_AQUI_TU_LINK_DE_GOOGLE_FORM" target="_blank" class="btn">CONFIRMAR ASISTENCIA</a>
            </div>
        </div>

        <div class="gallery-title">NUESTROS MOMENTOS</div>
        <div class="gallery">
            <img src="fotos/foto1.jpg" alt="Foto 1" onerror="this.style.display='none'">
            <img src="fotos/foto2.jpg" alt="Foto 2" onerror="this.style.display='none'">
            <img src="fotos/foto3.jpg" alt="Foto 3" onerror="this.style.display='none'">
            <img src="fotos/foto4.jpg" alt="Foto 4" onerror="this.style.display='none'">
        </div>

        <img src="fotos/footer.jpg" alt="Footer" class="footer-img" onerror="this.style.display='none'">
    </div>

    <script>
        const music = document.getElementById("bg-music");
        const playBtn = document.getElementById("play-btn");

        playBtn.addEventListener("click", function() {
            if (music.paused) {
                music.play();
                playBtn.classList.remove("fa-play-circle");
                playBtn.classList.add("fa-pause-circle");
            } else {
                music.pause();
                playBtn.classList.remove("fa-pause-circle");
                playBtn.classList.add("fa-play-circle");
            }
        });

        const targetDate = new Date("2026/10/03 20:30:00").getTime();

        function pad(n) { return (n < 10 ? '0' : '') + n; }

        setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("days").innerText = "00";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
                return;
            }

            document.getElementById("days").innerText = pad(Math.floor(distance / (1000 * 60 * 60 * 24)));
            document.getElementById("hours").innerText = pad(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            document.getElementById("minutes").innerText = pad(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)));
            document.getElementById("seconds").innerText = pad(Math.floor((distance % (1000 * 60)) / 1000));
        }, 1000);
    </script>
</body>
</html>
